<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🚀 スペースシューター</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
  body {
    background: #000;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; overflow: hidden;
    font-family: 'Courier New', monospace;
  }
  #wrap {
    position: relative;
    width: 100%; max-width: 480px;
    height: 100vh; max-height: 700px;
    overflow: hidden;
  }
  canvas { display: block; width: 100%; height: 100%; touch-action: none; }
  #hud {
    position: absolute; top: 0; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 16px; pointer-events: none; z-index: 10;
  }
  .hud-box {
    background: rgba(0,255,200,0.07);
    border: 1px solid rgba(0,255,200,0.25);
    border-radius: 8px;
    padding: 6px 14px;
    color: #00ffc8;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .hud-val { font-size: 20px; font-weight: 700; color: #fff; line-height: 1.1; }
  #shield-bar-wrap {
    position: absolute; bottom: 90px; left: 50%; transform: translateX(-50%);
    width: 160px; pointer-events: none; z-index: 10; text-align: center;
  }
  .bar-label { color: rgba(0,255,200,0.6); font-size: 9px; letter-spacing: 2px; margin-bottom: 4px; }
  #shield-bar {
    height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden;
  }
  #shield-fill { height: 100%; width: 100%; background: linear-gradient(90deg,#00ffc8,#00aaff); border-radius: 3px; transition: width 0.2s; }
  #joystick-zone {
    position: absolute; bottom: 0; left: 0; right: 0; height: 80px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; z-index: 10;
  }
  #fire-btn {
    width: 64px; height: 64px; border-radius: 50%;
    background: radial-gradient(circle, #ff4444 0%, #aa0000 100%);
    border: 2px solid rgba(255,100,100,0.5);
    color: #fff; font-size: 22px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 20px rgba(255,60,60,0.6);
    transition: transform 0.08s;
    -webkit-tap-highlight-color: transparent;
  }
  #fire-btn:active { transform: scale(0.92); }
  #move-hint { color: rgba(0,255,200,0.4); font-size: 10px; letter-spacing: 1px; text-align: center; }
  #overlay {
    position: absolute; inset: 0; z-index: 30;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.88);
  }
  #overlay h1 { color: #00ffc8; font-size: 28px; letter-spacing: 4px; margin-bottom: 6px; text-shadow: 0 0 20px #00ffc8; }
  #overlay .sub { color: rgba(255,255,255,0.45); font-size: 11px; letter-spacing: 2px; margin-bottom: 30px; }
  #overlay .big { color: #fff; font-size: 52px; font-weight: 700; line-height: 1; }
  #overlay .label { color: rgba(0,255,200,0.6); font-size: 10px; letter-spacing: 3px; margin-bottom: 28px; }
  #start-btn {
    background: transparent;
    border: 1px solid #00ffc8;
    color: #00ffc8;
    padding: 12px 36px;
    font-size: 13px;
    letter-spacing: 3px;
    cursor: pointer;
    font-family: 'Courier New', monospace;
    border-radius: 4px;
    text-transform: uppercase;
    transition: all 0.2s;
    box-shadow: 0 0 16px rgba(0,255,200,0.2);
  }
  #start-btn:hover, #start-btn:active { background: rgba(0,255,200,0.1); box-shadow: 0 0 24px rgba(0,255,200,0.4); }
  #wave-announce {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    color: #00ffc8; font-size: 22px; letter-spacing: 4px;
    text-shadow: 0 0 20px #00ffc8;
    pointer-events: none; z-index: 20;
    opacity: 0; transition: opacity 0.4s;
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="gc"></canvas>
  <div id="hud">
    <div class="hud-box">
      <div>SCORE</div>
      <div class="hud-val" id="score-el">0</div>
    </div>
    <div class="hud-box" style="text-align:center;">
      <div>WAVE</div>
      <div class="hud-val" id="wave-el">1</div>
    </div>
    <div class="hud-box" style="text-align:right;">
      <div>LIVES</div>
      <div class="hud-val" id="lives-el">❤❤❤</div>
    </div>
  </div>
  <div id="shield-bar-wrap">
    <div class="bar-label">SHIELD</div>
    <div id="shield-bar"><div id="shield-fill"></div></div>
  </div>
  <div id="joystick-zone">
    <div id="move-hint">← 指でドラッグ →</div>
    <div id="fire-btn" ontouchstart="fireTap()" onclick="fireTap()">🔥</div>
  </div>
  <div id="wave-announce"></div>
  <div id="overlay">
    <h1>SPACE SHOOTER</h1>
    <div class="sub">スペース シューター</div>
    <button id="start-btn" onclick="startGame()">▶ START</button>
  </div>
</div>

<script>
const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('wrap');
const scoreEl = document.getElementById('score-el');
const waveEl = document.getElementById('wave-el');
const livesEl = document.getElementById('lives-el');
const shieldFill = document.getElementById('shield-fill');
const overlay = document.getElementById('overlay');
const waveAnn = document.getElementById('wave-announce');

let W, H;
function resize() {
  const r = wrap.getBoundingClientRect();
  W = canvas.width = r.width;
  H = canvas.height = r.height;
}
resize();
window.addEventListener('resize', resize);

// State
let player, bullets, enemies, eBullets, particles, stars;
let score, lives, shield, wave, running, frameId;
let keys = {};
let touchX = null, prevTouchX = null;
let autoFire = false, autoFireTimer = 0;

function initStars() {
  stars = Array.from({length: 80}, () => ({
    x: Math.random() * W, y: Math.random() * H,
    r: Math.random() * 1.8 + 0.3,
    speed: 0.3 + Math.random() * 1.2,
    a: 0.3 + Math.random() * 0.7
  }));
}

function startGame() {
  score = 0; lives = 3; shield = 100; wave = 1; running = true;
  player = { x: W / 2, y: H - 120, w: 36, h: 44, speed: 5, invincible: 0 };
  bullets = []; enemies = []; eBullets = []; particles = [];
  initStars();
  updateHUD();
  overlay.style.display = 'none';
  spawnWave();
  if (frameId) cancelAnimationFrame(frameId);
  lastT = 0;
  frameId = requestAnimationFrame(tick);
}

function spawnWave() {
  showWave('WAVE ' + wave);
  let cols = Math.min(2 + wave, 6);
  let rows = Math.min(1 + Math.floor((wave - 1) / 2), 4);
  let spacing = 56;
  let totalW = cols * spacing;
  let gx = (W - totalW) / 2 + spacing / 2;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      // type: normal for wave 1-2, elite from wave 3, boss only from wave 6+
      let type = 'normal';
      if (wave >= 6 && r === 0) type = 'boss';
      else if (wave >= 3 && r === 0) type = 'elite';
      let hp = type === 'boss' ? 4 : type === 'elite' ? 2 : 1;
      enemies.push({
        x: gx + c * spacing, y: 70 + r * 56,
        w: 32, h: 28,
        hp, maxHp: hp,
        vx: (wave * 0.25 + 0.8) * (c % 2 === 0 ? 1 : -1),
        vy: 0.2 + wave * 0.08,
        shootTimer: 80 + Math.random() * 100 + (rows - r) * 20,
        type, hit: 0
      });
    }
  }
}

function showWave(txt) {
  waveAnn.textContent = txt;
  waveAnn.style.opacity = '1';
  setTimeout(() => { waveAnn.style.opacity = '0'; }, 1200);
}

let lastT = 0;
function tick(ts) {
  if (!running) return;
  let dt = Math.min((ts - lastT) / 16.7, 3);
  lastT = ts;
  update(dt);
  draw();
  frameId = requestAnimationFrame(tick);
}

function update(dt) {
  // Stars scroll
  for (let s of stars) {
    s.y += s.speed * dt;
    if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
  }

  // Player move
  let dx = 0;
  if (keys['ArrowLeft'] || keys['a']) dx -= 1;
  if (keys['ArrowRight'] || keys['d']) dx += 1;
  if (touchX !== null && prevTouchX !== null) dx = Math.sign(touchX - prevTouchX) * Math.min(Math.abs(touchX - prevTouchX) / 8, 1);
  player.x = Math.max(player.w / 2, Math.min(W - player.w / 2, player.x + dx * player.speed * dt));
  if (player.invincible > 0) player.invincible -= dt;

  // Auto fire
  autoFireTimer -= dt;
  if ((keys[' '] || autoFire) && autoFireTimer <= 0) {
    fireBullet();
    autoFireTimer = 12;
  }

  // Bullets
  for (let i = bullets.length - 1; i >= 0; i--) {
    let b = bullets[i];
    b.y -= b.speed * dt;
    if (b.y < -10) { bullets.splice(i, 1); continue; }
    // Hit enemy
    let hit = false;
    for (let j = enemies.length - 1; j >= 0; j--) {
      let e = enemies[j];
      if (Math.abs(b.x - e.x) < e.w / 2 + 4 && Math.abs(b.y - e.y) < e.h / 2 + 4) {
        e.hp--;
        e.hit = 6;
        spawnParticles(e.x, e.y, '#00ffc8', 5);
        if (e.hp <= 0) {
          score += e.type === 'elite' ? 20 : e.type === 'boss' ? 50 : 10;
          spawnParticles(e.x, e.y, '#ffcc00', 12);
          enemies.splice(j, 1);
        }
        bullets.splice(i, 1);
        hit = true; break;
      }
    }
    if (hit) continue;
  }

  // Enemies
  let edgeHit = false;
  for (let e of enemies) {
    e.x += e.vx * dt;
    e.y += e.vy * dt * 0.3;
    if (e.x < e.w / 2 || e.x > W - e.w / 2) { e.vx *= -1; e.y += 8; }
    if (e.hit > 0) e.hit -= dt;
    e.shootTimer -= dt;
    if (e.shootTimer <= 0) {
      eBullets.push({ x: e.x, y: e.y + 14, speed: 3 + wave * 0.3 });
      e.shootTimer = 60 + Math.random() * 80 - wave * 5;
    }
    // Reach player zone
    if (e.y > H - 100) { loseLife(); return; }
  }

  // Enemy bullets
  for (let i = eBullets.length - 1; i >= 0; i--) {
    let b = eBullets[i];
    b.y += b.speed * dt;
    if (b.y > H + 10) { eBullets.splice(i, 1); continue; }
    if (player.invincible <= 0 &&
        Math.abs(b.x - player.x) < player.w / 2 + 4 &&
        Math.abs(b.y - player.y) < player.h / 2 + 4) {
      eBullets.splice(i, 1);
      hitPlayer();
    }
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    let p = particles[i];
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.life -= dt;
    if (p.life <= 0) { particles.splice(i, 1); }
  }

  // Next wave
  if (enemies.length === 0) {
    wave++;
    waveEl.textContent = wave;
    setTimeout(() => spawnWave(), 1000);
  }

  updateHUD();
}

function fireBullet() {
  bullets.push({ x: player.x, y: player.y - player.h / 2, speed: 12 });
  if (wave >= 4) bullets.push({ x: player.x - 14, y: player.y - player.h / 3, speed: 12 });
  if (wave >= 7) bullets.push({ x: player.x + 14, y: player.y - player.h / 3, speed: 12 });
}

function fireTap() {
  fireBullet();
  autoFireTimer = 12;
}

function hitPlayer() {
  shield -= 34;
  if (shield <= 0) {
    shield = 0;
    loseLife();
    shield = 100;
  }
  player.invincible = 60;
  spawnParticles(player.x, player.y, '#ff4444', 8);
}

function loseLife() {
  lives--;
  player.invincible = 120;
  spawnParticles(player.x, player.y, '#ff4444', 20);
  if (lives <= 0) endGame();
}

function spawnParticles(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    let a = Math.random() * Math.PI * 2;
    let sp = 1 + Math.random() * 4;
    particles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, color, life: 20 + Math.random() * 20, r: 2 + Math.random() * 3 });
  }
}

function updateHUD() {
  scoreEl.textContent = score;
  livesEl.textContent = '❤'.repeat(Math.max(0, lives));
  shieldFill.style.width = shield + '%';
}

function draw() {
  ctx.fillStyle = '#050010';
  ctx.fillRect(0, 0, W, H);

  // Stars
  for (let s of stars) {
    ctx.save();
    ctx.globalAlpha = s.a;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }

  // Nebula effect
  ctx.save();
  ctx.globalAlpha = 0.04;
  let grad = ctx.createRadialGradient(W * 0.3, H * 0.4, 0, W * 0.3, H * 0.4, 200);
  grad.addColorStop(0, '#6600ff'); grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);
  grad = ctx.createRadialGradient(W * 0.7, H * 0.6, 0, W * 0.7, H * 0.6, 180);
  grad.addColorStop(0, '#0044ff'); grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);
  ctx.restore();

  // Player bullets
  for (let b of bullets) {
    ctx.save();
    ctx.shadowColor = '#00ffc8'; ctx.shadowBlur = 10;
    ctx.fillStyle = '#00ffc8';
    ctx.fillRect(b.x - 2, b.y - 10, 4, 14);
    ctx.restore();
  }

  // Enemy bullets
  for (let b of eBullets) {
    ctx.save();
    ctx.shadowColor = '#ff4444'; ctx.shadowBlur = 8;
    ctx.fillStyle = '#ff6666';
    ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }

  // Enemies
  for (let e of enemies) {
    ctx.save();
    ctx.translate(e.x, e.y);
    if (e.hit > 0) { ctx.globalAlpha = 0.5 + Math.sin(e.hit * 2) * 0.5; }
    drawEnemy(e);
    ctx.restore();
  }

  // Player
  if (player.invincible <= 0 || Math.floor(player.invincible / 6) % 2 === 0) {
    ctx.save();
    ctx.translate(player.x, player.y);
    drawPlayer();
    ctx.restore();
  }

  // Particles
  for (let p of particles) {
    ctx.save();
    ctx.globalAlpha = p.life / 40;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color; ctx.shadowBlur = 6;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }
}

function drawPlayer() {
  ctx.shadowColor = '#00ffc8'; ctx.shadowBlur = 16;
  // Engine glow
  ctx.fillStyle = '#ff8800';
  ctx.beginPath();
  ctx.ellipse(0, 22, 6, 10 + Math.random() * 4, 0, 0, Math.PI * 2);
  ctx.fill();
  // Body
  ctx.fillStyle = '#c0e0ff';
  ctx.beginPath();
  ctx.moveTo(0, -22); ctx.lineTo(-16, 18); ctx.lineTo(-8, 14); ctx.lineTo(0, 18);
  ctx.lineTo(8, 14); ctx.lineTo(16, 18); ctx.closePath(); ctx.fill();
  // Cockpit
  ctx.fillStyle = '#00ffc8';
  ctx.beginPath(); ctx.ellipse(0, -6, 6, 10, 0, 0, Math.PI * 2); ctx.fill();
  // Wings
  ctx.fillStyle = '#7099cc';
  ctx.beginPath(); ctx.moveTo(-16, 18); ctx.lineTo(-28, 26); ctx.lineTo(-14, 14); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(16, 18); ctx.lineTo(28, 26); ctx.lineTo(14, 14); ctx.closePath(); ctx.fill();
}

function drawEnemy(e) {
  let color = e.type === 'boss' ? '#ff4444' : e.type === 'elite' ? '#ffaa00' : '#aa44ff';
  ctx.shadowColor = color; ctx.shadowBlur = 10;
  ctx.fillStyle = color;
  if (e.type === 'boss') {
    ctx.beginPath();
    ctx.moveTo(0, -14); ctx.lineTo(16, 14); ctx.lineTo(0, 8); ctx.lineTo(-16, 14); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#ff8888';
    ctx.beginPath(); ctx.ellipse(0, 0, 7, 5, 0, 0, Math.PI * 2); ctx.fill();
  } else if (e.type === 'elite') {
    ctx.beginPath();
    ctx.moveTo(0, 14); ctx.lineTo(-14, -10); ctx.lineTo(0, -4); ctx.lineTo(14, -10); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#ffdd88';
    ctx.beginPath(); ctx.ellipse(0, 2, 5, 4, 0, 0, Math.PI * 2); ctx.fill();
  } else {
    ctx.beginPath();
    ctx.moveTo(0, 14); ctx.lineTo(-12, -8); ctx.lineTo(0, -2); ctx.lineTo(12, -8); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#cc88ff';
    ctx.beginPath(); ctx.ellipse(0, 2, 4, 3, 0, 0, Math.PI * 2); ctx.fill();
  }
  // HP bar for elite/boss
  if (e.maxHp > 1) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(-14, -20, 28, 4);
    ctx.fillStyle = color;
    ctx.fillRect(-14, -20, 28 * (e.hp / e.maxHp), 4);
  }
}

function endGame() {
  running = false;
  overlay.innerHTML = `
    <h1>GAME OVER</h1>
    <div class="sub">ゲームオーバー</div>
    <div class="big">${score}</div>
    <div class="label">SCORE — WAVE ${wave}</div>
    <button id="start-btn" onclick="startGame()">▶ RETRY</button>
  `;
  overlay.style.display = 'flex';
}

// Keyboard
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ') e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.key] = false; });

// Touch move for ship control
let touchStartX = null;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (e.touches[0].clientY > wrap.getBoundingClientRect().top + H - 100) return;
  touchStartX = e.touches[0].clientX;
  touchX = e.touches[0].clientX;
  prevTouchX = touchStartX;
}, {passive: false});

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  prevTouchX = touchX;
  touchX = e.touches[0].clientX;
}, {passive: false});

canvas.addEventListener('touchend', e => {
  touchX = null; prevTouchX = null;
}, {passive: false});

// Auto-fire hold
const fireBtn = document.getElementById('fire-btn');
fireBtn.addEventListener('touchstart', e => { e.stopPropagation(); autoFire = true; });
fireBtn.addEventListener('touchend', () => { autoFire = false; });
fireBtn.addEventListener('mousedown', () => { autoFire = true; });
fireBtn.addEventListener('mouseup', () => { autoFire = false; });
</script>
</body>
</html>
